sheets:
  # Holdings aggregated by stock from actual-investment-sync
  - id: investment-holdings
    title: "Investment Holdings"
    spreadsheetId: ${env:SHEETS_DEFAULT_SPREADSHEET_ID}
    tab: Holdings
    clearRange: "Holdings!A:H"
    range: "Holdings!A1"
    mode: clear-and-replace
    syncTarget: default
    cron: "0 19 * * *" # daily at 19:00
    source:
      type: http
      options:
        url: http://actual-investment-sync:3000/api/export/holdings
        headers:
          Authorization: "Bearer ${env:INVESTMENT_API_TOKEN}"
    transform:
      columns:
        - label: Holding Name
          value: holdingName
        - label: Symbol
          value: symbol
        - label: Provider
          value: provider
        - label: Total Quantity
          value: "${toNumber(totalQuantity)}"
        - label: Unit Price
          value: "${toNumber(unitPrice)}"
        - label: Total Market Value
          value: "${toNumber(totalMarketValue)}"
        - label: Last Updated
          value: "${formatDate(syncStartedAt, 'yyyy-MM-dd HH:mm')}"
